name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (dev only, no GPU group)
        run: uv sync --group dev

      # Skip test modules that need GPU-group deps (imgutils, supervision) at
      # runtime — their GPU-marked tests cannot run on a CPU runner anyway,
      # and the unit tests in these files exercise the wrapped library code
      # directly. Everything else, minus tests marked `gpu`, runs here.
      - name: Run pytest
        run: |
          uv run --no-sync pytest -m 'not gpu' \
            --ignore=tests/test_detect.py \
            --ignore=tests/test_crop.py \
            --ignore=tests/test_pipeline_e2e.py \
            --ignore=tests/test_tag.py \
            --ignore=tests/test_track.py \
            --ignore=tests/test_identify.py \
            --ignore=tests/test_frame_select.py

  frontend-tests:
    name: Frontend (vitest + svelte-check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (svelte-check)
        run: npx svelte-check --tsconfig ./tsconfig.json

      - name: Run vitest
        run: npm test
